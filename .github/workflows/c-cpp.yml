name: ANOGS + Titanox CI

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout ANOGS repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install dpkg ldid
          export THEOS=/opt/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          sudo mkdir -p $THEOS
          sudo chown -R $USER:staff $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS --depth=1

      - name: Download iOS 18.6 SDK
        run: |
          export THEOS=/opt/theos
          cd /tmp
          git clone https://github.com/Tonwalter888/iOS-SDKs.git --depth=1
          cp -r iPhoneOS18.6.sdk $THEOS/sdks/
          ls -la $THEOS/sdks/

      - name: Clone and build Titanox (patched)
        run: |
          export THEOS=/opt/theos
          cd /tmp
          git clone https://github.com/Ragekill3377/Titanox.git --depth=1
          cd Titanox/libtitanox

          # إصلاح Makefile: استبدال المسار الثابت بـ THEOS
          sed -i '' 's|THEOS = /home/rage/theos|THEOS = /opt/theos|g' Makefile

          # استبدال SDK القديم بأحدث SDK متوفر
          sed -i '' 's|SYSROOT = $(THEOS)/sdks/iPhoneOS13.7.sdk|SYSROOT = $(THEOS)/sdks/iPhoneOS18.6.sdk|g' Makefile

          # إصلاح مسار النسخ
          sed -i '' 's|cp /home/rage/theos/lib/libtitanox.dylib|cp $(THEOS)/lib/libtitanox.dylib|g' Makefile

          echo "===== Patched Makefile ====="
          head -10 Makefile

          make THEOS=$THEOS

          # نسخ الناتج إلى Theos
          cp libtitanox.dylib $THEOS/lib/
          cp Titanox.h $THEOS/include/

      - name: Build tweak (ANOGS)
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1

      - name: Prepare artifacts
        run: |
          mkdir -p output
          if ls packages/*.deb 1> /dev/null 2>&1; then
            cp packages/*.deb output/
            DEB_FILE=$(ls packages/*.deb | head -1)
            mkdir -p deb_extract
            dpkg-deb -x "$DEB_FILE" deb_extract
            find deb_extract -name "*.dylib" -exec cp {} output/ANOGS.dylib \;
            rm -rf deb_extract
          fi
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANOGS-Titanox
          path: output/
