name: Build UltimateBypass Tweak

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:      # يسمح بالتشغيل اليدوي

jobs:
  build:
    runs-on: macos-latest   # يحتاج Theos لنظام macOS مع Xcode

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # تثبيت الأدوات المطلوبة
          brew install dpkg ldid

          # استنساخ Theos
          export THEOS=/opt/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          sudo mkdir -p $THEOS
          sudo chown -R $USER:staff $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS --depth=1

      - name: Verify structure
        run: |
          echo "Listing files..."
          ls -R
          # التأكد من وجود fishhook.h و fishhook.c
          test -f fishhook/fishhook.h
          test -f fishhook/fishhook.c

      - name: Build package
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1

      - name: Prepare artifacts
        run: |
          mkdir -p output
          # نسخ ملف .deb
          cp packages/*.deb output/ || echo "No .deb found"

          # استخراج الملف الديناميكي (dylib) من الحزمة
          # نفك الحزمة مؤقتاً
          DEB_FILE=$(ls packages/*.deb | head -1)
          if [ -f "$DEB_FILE" ]; then
            mkdir -p deb_extract
            dpkg-deb -x "$DEB_FILE" deb_extract
            find deb_extract -name "*.dylib" -exec cp {} output/UltimateBypass.dylib \;
            rm -rf deb_extract
          fi

          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UltimateBypass
          path: output/

  # إنشاء Release تلقائي عند دفع tag
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: UltimateBypass
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: UltimateBypass ${{ github.ref_name }}
          body: |
            إصدار جديد من UltimateBypass.
            يحتوي على:
            - مكتبة `.dylib` جاهزة للحقن
            - ملف `.deb` للتثبيت (لأجهزة الجيلبريك أيضاً)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
