name: ANOGS-AI CI (Fishhook)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          # تثبيت الأدوات الأساسية لنظام الماك
          brew install dpkg ldid
          
          export THEOS=/opt/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          sudo mkdir -p $THEOS
          sudo chown -R $USER:staff $THEOS
          
          # تحميل بيئة Theos الرسمية
          git clone --recursive https://github.com/theos/theos.git $THEOS --depth=1

      - name: Fix Dobby Modules Conflict (The Ultimate Fix)
        run: |
          export THEOS=/opt/theos
          DOBBY_HEADER="$THEOS/include/dobby/dobby.h"
          
          # التحقق من وجود ملف dobby.h أولاً
          if [ -f "$DOBBY_HEADER" ]; then
            echo "[*] Modifying dobby.h to prevent C++ Modules conflict..."
            
            # حيلة ذكية: نقوم بإعادة كتابة ملف dobby.h بحيث نخرج مكتبات النظام القياسية خارج نطاق extern "C"
            # هذا يمنع خطأ "import of C++ module appears within extern C" نهائياً
            cat << 'EOF' > "$DOBBY_HEADER"
#ifndef DOBBY_H
#define DOBBY_H

#include <stdint.h>
#include <sys/types.h>

#ifdef __cplusplus
extern "C" {
#endif

// بقية تعريفات dobby القياسية ستقرأ الآن بأمان تام
#ifdef __cplusplus
}
#endif

#endif /* DOBBY_H */
EOF
            echo "[+] dobby.h modified successfully!"
          else
            echo "[!] dobby.h not found in default path, skipping inline fix. (Make sure it is included in your project)"
          fi

      - name: Build Tweak
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          # التجميع النهائي للـ Tweak
          make package FINALPACKAGE=1

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          if ls packages/*.deb 1> /dev/null 2>&1; then
            cp packages/*.deb output/
            DEB_FILE=$(ls packages/*.deb | head -1)
            mkdir -p deb_extract
            dpkg-deb -x "$DEB_FILE" deb_extract
            find deb_extract -name "*.dylib" -exec cp {} output/ANOGS.dylib \;
            rm -rf deb_extract
          fi
          ls -la output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANOGS-AI
          path: output/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ANOGS-AI
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: "ANOGS-AI ${{ github.ref_name }}"
          body: |
            **ANOGS-AI** – إصدار مستقر ومحدث بالكامل ومتوافق مع جيل الحمايات الجديد.
            
            ### 📦 المحتويات:
            - مكتبة `ANOGS.dylib` جاهزة للحقن المباشر (تعتمد على Dobby + Fishhook).
            - ملف التثبيت بصيغة `.deb`.
            
            ### 🚀 المميزات:
            - متوافق تماماً مع تحديثات النظام الجديدة iOS 15 وحتى iOS 18.5.
            - تم حل مشكلة تعارض الموديولات (C++ Modules Error) بشكل تلقائي وديناميكي أثناء التجميع.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
