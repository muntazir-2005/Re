name: iOS Theos Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    # 1. سحب كود المستودع الخاص بك
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. إعداد بيئة Xcode
    - name: Set up Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    # 3. تثبيت أحدث بيئة لـ Theos والـ SDKs تلقائياً
    - name: Install Theos Environment
      run: |
        # تحميل وتثبيت Theos في المسار الافتراضي
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
        
        # تحميل أحدث الـ SDKs المطلوبة للبناء (iOS 14+ أو أحدث) لضمان عدم فشل المترجم
        git clone https://github.com/theos/sdks.git $THEOS/sdks

    # 4. تثبيت الاعتمادات الخارجية مثل OpenSSL إذا كان كودك يستدعيها
    - name: Install Dependencies
      run: |
        brew install openssl@3
        # عمل روابط مخصصة لـ Theos ليجد OpenSSL أثناء البناء
        mkdir -p ./include ./lib
        ln -s /opt/homebrew/opt/openssl@3/include/* ./include/
        ln -s /opt/homebrew/opt/openssl@3/lib/*.a ./lib/

    # 5. تشغيل أمر البناء الخاص بـ Theos
    - name: Compile Tweak / Library via Theos
      run: |
        # تفعيل متغيرات البيئة لـ Theos وتشغيل البناء للنسخة النهائية (Release)
        export THEOS=/Users/runner/theos
        make package FINALPACKAGE=1

    # 6. تصحيح الخطأ: رفع الملفات الناتجة باستخدام الأكشن الصحيح الرسمي
    - name: Upload Built Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-theos-package
        # سيقوم الأكشن بالبحث عن مجلد packages الذي ينشئه Theos تلقائياً ويرفع ملف الـ .deb أو الـ .dylib المتواجد بداخله
        path: |
          packages/*.deb
          .theos/obj/debug/*.dylib
          *.dylib
        if-no-files-found: warn
