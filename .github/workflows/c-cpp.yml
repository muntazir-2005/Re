name: iOS Hook Library Build

# تحديد متى يتم تشغيل هذا الأكشن (عند الرفع أو طلب السحب على فرع main)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    # استخدام خادم macOS لأننا نحتاج لـ iOS SDK و Xcode Command Line Tools
    runs-on: macos-latest

    steps:
    # 1. سحب كود المشروع من جيت هب إلى الخادم
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive # لسحب مكتبات الطرف الثالث إذا كانت مضافة كـ submodules

    # 2. إعداد وإظهار نسخة Xcode المستخدمة للتأكد من وجود الـ SDK
    - name: Set up Xcode and iOS SDK
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
        xcrun --sdk iphoneos --show-sdk-path

    # 3. تثبيت أو إعداد المكتبات الخارجية (OpenSSL كمثال عبر Homebrew)
    # ملاحظة: إذا كانت مكتبات Dobby و fishhook مرفوعة معك في المشروع، سيقرأها الـ Makefile تلقائياً.
    # هنا نقوم بتثبيت openssl للتأكد من توفر الملفات الرأسية (Headers)
    - name: Install Dependencies via HomeBrew
      run: |
        brew install openssl@3
        # إنشاء روابط رمزية (Symlinks) إذا كنت بحاجة لربطها بمسار مشروعك
        mkdir -p ./openssl
        ln -s /opt/homebrew/opt/openssl@3/include ./openssl/include
        ln -s /opt/homebrew/opt/openssl@3/lib ./openssl/lib

    # 4. تنفيذ أمر البناء باستخدام الـ Makefile الذي أنشأناه سابقاً
    - name: Compile iOS dylib via Makefile
      run: |
        make

    # 5. حفظ الملف الناتج (.dylib) كـ Artifact لتحميله بعد انتهاء البناء
    - name: Upload Built Binary Artifact
      uses: actions/artifacts@v4
      with:
        name: ios-hook-library
        path: final_hook.dylib # اسم الملف الناتج من الـ Makefile
