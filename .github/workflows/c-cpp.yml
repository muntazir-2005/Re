name: iOS Theos Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    # 1. سحب كود المستودع الخاص بك
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. إعداد بيئة Xcode
    - name: Set up Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    # 3. تثبيت أدوات Theos الضرورية واستنساخ Theos يدوياً (بدون سكربت install-theos)
    - name: Install Theos & Build Tools
      run: |
        # تثبيت الأدوات التي يعتمد عليها Theos لإنشاء .deb
        brew install dpkg ldid fakeroot

        # تعيين المسار الدائم لـ Theos
        export THEOS=/Users/runner/theos
        echo "THEOS=$THEOS" >> $GITHUB_ENV

        # استنساخ مستودع Theos مباشرة (git clone لا يستخدم GitHub API ولن يتأثر بالحدود)
        git clone --depth 1 https://github.com/theos/theos.git $THEOS

    # 4. تثبيت iOS SDK يدوياً (تجاوز أي اعتماد على API خارجي)
    - name: Install iOS SDK Manually
      run: |
        mkdir -p $THEOS/sdks
        curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
        tar -xf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
        rm iPhoneOS14.5.sdk.tar.xz

    # 5. تثبيت الاعتمادات الخارجية (OpenSSL إلخ)
    - name: Install Dependencies
      run: |
        brew install openssl@3
        mkdir -p ./include ./lib
        ln -s /opt/homebrew/opt/openssl@3/include/* ./include/
        ln -s /opt/homebrew/opt/openssl@3/lib/*.a ./lib/

    # 6. تشغيل أمر البناء
    - name: Compile Tweak / Library via Theos
      run: make package FINALPACKAGE=1

    # 7. رفع الملفات الناتجة
    - name: Upload Built Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-theos-package
        path: |
          packages/*.deb
          .theos/obj/debug/*.dylib
          *.dylib
        if-no-files-found: warn
