name: ANOGS-AI CI (Fishhook)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos and iOS SDK
        run: |
          # 1. تثبيت الأدوات الأساسية للتجميع والـ التوقيع الرقمي
          brew install dpkg ldid
          
          export THEOS=/opt/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          sudo mkdir -p $THEOS
          sudo chown -R $USER:staff $THEOS
          
          # 2. تحميل النسخة الخفيفة والأحدث من بيئة Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS --depth=1
          
          # 3. الحل الجذري والآمن لتحميل الـ SDK الفعلي مباشرة دون مشاكل الـ Git LFS
          mkdir -p $THEOS/sdks
          curl -L -o $THEOS/sdks/iPhoneOS16.5.sdk.tar.xz https://github.com/theos/sdks/releases/download/v1.0/iPhoneOS16.5.sdk.tar.xz
          tar -xf $THEOS/sdks/iPhoneOS16.5.sdk.tar.xz -C $THEOS/sdks/
          rm $THEOS/sdks/iPhoneOS16.5.sdk.tar.xz

      - name: Build Tweak
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          # التجميع الفعلي بصيغة الـ Release النهائية
          make package FINALPACKAGE=1

      - name: Prepare Artifacts
        run: |
          mkdir -p output
          if ls packages/*.deb 1> /dev/null 2>&1; then
            cp packages/*.deb output/
            DEB_FILE=$(ls packages/*.deb | head -1)
            mkdir -p deb_extract
            dpkg-deb -x "$DEB_FILE" deb_extract
            # استخراج ملف الـ dylib وحفظه بشكل منفصل للحقن المباشر
            find deb_extract -name "*.dylib" -exec cp {} output/ANOGS.dylib \;
            rm -rf deb_extract
          fi
          ls -la output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANOGS-AI
          path: output/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: ANOGS-AI
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: "ANOGS-AI ${{ github.ref_name }}"
          body: |
            **ANOGS-AI** – إصدار مستقر ومحدث بالكامل.
            
            ### 📦 المحتويات:
            - مكتبة `ANOGS.dylib` جاهزة للحقن المباشر (تعتمد على Dobby + Fishhook).
            - ملف التثبيت بصيغة `.deb`.
            
            ### 🚀 المميزات:
            - حل شامل لمشاكل التجميع وأخطاء الـ `std_stdint_h` والـ OpenSSL Headers المفقودة.
            - حماية AntiBan متوافقة تماماً من نظام iOS 15 وحتى iOS 18.5.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
