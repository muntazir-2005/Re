name: ANOGS-AI CI (Fishhook)

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          brew install dpkg ldid
          export THEOS=/opt/theos
          echo "THEOS=$THEOS" >> $GITHUB_ENV
          sudo mkdir -p $THEOS
          sudo chown -R $USER:staff $THEOS
          git clone --recursive https://github.com/theos/theos.git $THEOS --depth=1

      - name: Build tweak
        run: |
          export THEOS=/opt/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1

      - name: Prepare artifacts
        run: |
          mkdir -p output
          if ls packages/*.deb 1> /dev/null 2>&1; then
            cp packages/*.deb output/
            DEB_FILE=$(ls packages/*.deb | head -1)
            mkdir -p deb_extract
            dpkg-deb -x "$DEB_FILE" deb_extract
            find deb_extract -name "*.dylib" -exec cp {} output/ANOGS.dylib \;
            rm -rf deb_extract
          fi
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ANOGS-AI
          path: output/

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ANOGS-AI
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          name: "ANOGS-AI ${{ github.ref_name }}"
          body: |
            **ANOGS-AI** – إصدار جديد مع حماية AI وبصمة متغيرة.
            يحتوي على:
            - مكتبة `ANOGS.dylib` جاهزة للحقن (fishhook)
            - ملف `.deb` للتثبيت
            - AntiBan قوي متوافق مع iOS 15-18.5
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
