name: iOS Theos Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    # 1. سحب كود المستودع الخاص بك
    - name: Checkout Repository Code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # 2. إعداد بيئة Xcode
    - name: Set up Xcode
      run: |
        sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

    # 3. تثبيت أحدث بيئة لـ Theos (مع تجاوز الفحص التلقائي للـ SDK)
    - name: Install Theos Environment
      run: |
        # تعيين مسار البيئة لـ Theos
        export THEOS=/Users/runner/theos
        echo "THEOS=$THEOS" >> $GITHUB_ENV
        
        # تحميل الأداة مع إيقاف ميزة التثبيت التلقائي للـ SDK لتفادي الخطأ
        bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)" -- --no-sdks

    # 4. تثبيت الـ SDK يدوياً وبسرعة فائقة (تجاوز خطأ الـ API)
    - name: Install iOS SDK Manually
      run: |
        # إنشاء مجلد الـ SDKs داخل Theos
        mkdir -p $THEOS/sdks
        
        # تحميل الحزمة المخصصة لـ iOS 14.5 بشكل مباشر (أكثر النسخ استقراراً مع التويكات)
        curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
        
        # فك الضغط ونقل الملف للمسار الصحيح
        tar -xf iPhoneOS14.5.sdk.tar.xz -C $THEOS/sdks/
        
        # تنظيف الملف المضغوط لتوفير المساحة
        rm iPhoneOS14.5.sdk.tar.xz

    # 5. تثبيت الاعتمادات الخارجية مثل OpenSSL
    - name: Install Dependencies
      run: |
        brew install openssl@3
        mkdir -p ./include ./lib
        ln -s /opt/homebrew/opt/openssl@3/include/* ./include/
        ln -s /opt/homebrew/opt/openssl@3/lib/*.a ./lib/

    # 6. تشغيل أمر البناء الخاص بـ Theos
    - name: Compile Tweak / Library via Theos
      run: |
        make package FINALPACKAGE=1

    # 7. رفع الملفات الناتجة (.deb أو .dylib)
    - name: Upload Built Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-theos-package
        path: |
          packages/*.deb
          .theos/obj/debug/*.dylib
          *.dylib
        if-no-files-found: warn
