name: Build ANOGS.dylib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build dylib
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ANOGS.dylib
          path: ANOGS.dylib
